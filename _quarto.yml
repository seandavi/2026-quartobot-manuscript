project:
  type: manuscript
  pre-render: quartobot resolve --from-scan . --id-mode citation-key
  # voice-samples/ contains PHI from past trainees' grant text. Two
  # locks: the dir is named `_voice-samples/` (Quarto excludes
  # underscore-prefixed dirs by default), AND an explicit negation
  # below. Don't remove either without checking with the data owner.
  render:
    - "*.qmd"
    - "*.md"
    - "!_voice-samples/"
    - "!voice-samples/"

manuscript:
  article: index.qmd

bibliography:
  - references.bib
  - references.resolved.bib

format:
  html:
    comments:
      hypothesis: true
  docx: default
  jats: default
  pdf: default

  # (other formats)
  # pdf: default

execute:
  freeze: true
